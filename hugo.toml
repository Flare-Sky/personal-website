baseURL = 'https://flare-sky.github.io/'
languageCode = 'zh-cn'
title = '寄居者的日记'
theme = 'PaperMod'
hasCJKLanguage = true

[params]
  defaultTheme = "auto"
  ShowReadingTime = true      # 显示阅读时间
  ShowWordCount = true        # 显示字数统计
  ShowPostNavLinks = true     # 显示文章底部的“上一篇/下一篇”导航
  ShowShareButtons = false    # 隐藏转发按钮
  
  # 主页个人简介设置
  [params.profileMode]
    enabled = true
    title = "寄居者的日记"
    subtitle = "亲爱的弟兄啊，你们是客旅，是寄居的。(彼得前书 2:11a)"
  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"
    safari_pinned_tab = "/favicon.ico"

# 设置网页顶部的导航菜单
[[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 10
[[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20
[[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30