baseURL = 'https://flaresky.me/'
theme = 'PaperMod'
defaultContentLanguage = 'zh'
hasCJKLanguage = true
[outputs]
    home = ["HTML", "RSS", "JSON"]
[params]
    defaultTheme = "auto"
    ShowReadingTime = true      # 显示阅读时间
    ShowWordCount = true        # 显示字数统计
    ShowPostNavLinks = true     # 显示文章底部的“上一篇/下一篇”导航
    ShowShareButtons = false    # 隐藏转发按钮
    enable = true               # 阅读量统计（不蒜子）的总开关
    comments = true             # 显示评论区
 
    [params.assets]
        favicon = "/favicon.ico"
        favicon16x16 = "/favicon-16x16.png"
        favicon32x32 = "/favicon-32x32.png"
        apple_touch_icon = "/apple-touch-icon.png"
        safari_pinned_tab = "/favicon.ico"

    [params.fuseOpts]
        isCaseSensitive = false
        shouldSort = true
        location = 0
        distance = 1000
        threshold = 0.4
        minMatchCharLength = 2
        keys = ["title", "permalink", "summary", "content"]

[languages.zh]
    languageCode = 'zh-cn'
    title = '寄居者的日记'
    weight = 1

    [languages.zh.params.profileMode]
        enabled = true
        title = "寄居者的日记"
        subtitle = "亲爱的弟兄啊，你们是客旅，是寄居的。(彼得前书 2:11a)"

    [[languages.zh.menu.main]]
        identifier = "home"
        name = "首页"
        url = "/"
        weight = 10
    [[languages.zh.menu.main]]
        identifier = "archives"
        name = "归档"
        url = "/archives/"
        weight = 20
    [[languages.zh.menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags/"
        weight = 30
    [[languages.zh.menu.main]]
        identifier = "search"
        name = "搜索"
        url = "/search/"
        weight = 40

[languages.en]
    languageCode = 'en'
    title = 'Journal of a Sojourner'
    weight = 2

    [languages.en.params.profileMode]
        enabled = true
        title = "Journal of a Sojourner"
        subtitle = "Beloved, I urge you as sojourners and exiles... (1 Peter 2:11a)"

    [[languages.en.menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 10
    [[languages.en.menu.main]]
        identifier = "archives"
        name = "Archives"
        url = "/archives/"
        weight = 20
    [[languages.en.menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
        weight = 30
    [[languages.en.menu.main]]
        identifier = "search"
        name = "Search"
        url = "/search/"
        weight = 40

[markup.goldmark.renderer]
    unsafe = true