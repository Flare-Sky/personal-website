<div style="text-align: center; margin-top: 20px; font-size: 0.8em; color: var(--secondary);">
    {{ if eq .Lang "zh" }}本站总访客数{{ else }}Total Visitors:{{ end }} 
    <span id="busuanzi_site_uv"><i class="fa fa-spinner fa-spin"></i></span>
    {{ if eq .Lang "zh" }} 人{{ end }}
</div>

<style>
body {
    animation: langFadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes langFadeIn {
    0% { opacity: 0; filter: blur(2px); transform: translateY(4px); }
    100% { opacity: 1; filter: blur(0); transform: translateY(0); }
}

body.lang-switching {
    animation: langFadeOut 0.25s ease-out forwards;
}
@keyframes langFadeOut {
    0% { opacity: 1; transform: scale(1); filter: blur(0); }
    100% { opacity: 0; transform: scale(0.99); filter: blur(2px); }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const langLinks = document.querySelectorAll('.lang-switch a');
    
    langLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            
            const currentPath = window.location.pathname;
            
            const currentLang = document.documentElement.lang;
            
            let targetUrl = "";
            
            if (currentLang.startsWith("zh")) {
                if (currentPath === "/" || currentPath === "") {
                    targetUrl = "/en/";
                } else {
                    targetUrl = "/en" + currentPath.replace(/\/$/, "") + "/";
                }
            } else {
                targetUrl = currentPath.replace(/^\/en/, "");
                if (targetUrl === "" || targetUrl === "/") {
                    targetUrl = "/";
                } else {
                    targetUrl = targetUrl.replace(/\/$/, "") + "/";
                }
            }
            
            document.body.classList.add('lang-switching');
            
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 250);
        });
    });
});
</script>
