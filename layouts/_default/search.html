{{- define "main" }}

<header class="page-header">
    <h1>{{ .Title }}</h1>
    {{- if .Description }}
    <div class="post-description">
        {{ .Description }}
    </div>
    {{- end }}
</header>

<div id="searchbox">
    <svg id="secret-magnifier" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    
    <input id="searchInput" autofocus placeholder="{{ .Params.placeholder | default (printf "%s ↵" .Title) }}"
        aria-label="search" type="search" autocomplete="off" maxlength="64">
</div>

<ul id="searchResults" aria-label="search results"></ul>

<style>
    #secret-magnifier {
        cursor: pointer;
        transition: all 0.3s ease;
        pointer-events: auto !important; 
        z-index: 10;
    }
    
    #secret-magnifier:hover {
        stroke: var(--tertiary);
        transform: scale(1.15) rotate(5deg);
    }
    
    .blackout {
        background-color: #000 !important;
        transition: background-color 0.4s ease;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const magnifier = document.getElementById('secret-magnifier');
        const searchInput = document.getElementById('searchInput');

        if (magnifier) {
            magnifier.addEventListener('click', function() {
                if (searchInput) {
                    searchInput.value = "/// CONNECTING TO SECURE TERMINAL ///";
                    searchInput.style.color = "#00ff00";
                    searchInput.style.fontFamily = "monospace";
                    searchInput.disabled = true;
                }

                document.body.classList.add('blackout');
                
                setTimeout(() => {
                    window.location.href = "/access/";
                }, 600);
            });
        }
    });
</script>

{{- end }}
